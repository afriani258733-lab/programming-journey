<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <head>
       <title>Praktik Border 1</title>
       <style>
           .solid {
              border: 3px solid blue;
              background-color: lightpink;
              padding: 10px;
            }
           .dotted {
              border: 3px dotted red;
              background-color: lightblue;
              padding: 10px;
            }
           .double {
              border: 5px double green;
              background-color: lightgrey;
              padding: 10px;
            }
           .dashed {
              border: 3px dashed purple;
              background-color: lightgoldenrodyellow;
              padding: 10px;
            }
            .groove {
                border: 3px groove yellow;
                background-color: lightskyblue;
                padding: 10px;
            }
            .ridge {
                border: 5px ridge cornsilk;
                background-color: lightgreen;
                padding: 10px;
            }
    </style>
</head>
<body>

<h2>Contoh Border CSS</h2>

<p class="solid">Ini border solid</p>
<p class="dotted">Ini border dotted</p>
<p class="double">Ini border double</p>
<p class="dashed">Ini border dashed</p>
<p class="groove">Ini border groove</p>
<p class="ridge">Ini border ridge</p>

</body>
</html>
