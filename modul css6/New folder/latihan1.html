<!DOCTYPE html>
<html>
<head>
    <title>Latihan 1 Border</title>
    <style>
        .kotak {
            width: 200px;
            height: 100px;
            margin: 10px;
            padding: 20px;
        }

        .solid {
            border: 5px solid black;
        }

        .double {
            border: 5px double blue;
        }

        .groove {
            border: 5px groove green;
        }

        .ridge {
            border: 5px ridge red;
        }
    </style>
</head>
<body>

<div class="kotak solid">Border Solid</div>
<div class="kotak double">Border Double</div>
<div class="kotak groove">Border Groove</div>
<div class="kotak ridge">Border Ridge</div>

</body>
</html>
