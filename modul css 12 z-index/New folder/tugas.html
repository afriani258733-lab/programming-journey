<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas Z-Index</title>
    <style>
        .wadah {
            position: relative;
            width: 500px;
            height: 300px;
        }

        .wadah img {
            width: 200px;
            position: absolute;
        }
        .gbr1 {
            top: 20px;
            left: 20px;
            z-index: 3;
        }
        .gbr2 {
            top: 100px;
            left: 200px;
            z-index: 2;
        }
        .gbr3 {
            top: 200px;
            left: 400px;
            z-index: 1;
        }
    </style>
</head>
<body>


    <div class="wadah">
        <img src="classic hip hop albums ft snoopy 🐶__@pauligrafi_.jpeg" class="gbr1">
        <img src="download (1).jpeg" class="gbr2">
        <img src="matty healy as snoopy.jpeg" class="gbr3">
    </div>

</body>
</html>
