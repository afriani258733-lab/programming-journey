<!DOCTYPE html>
<html>
<head>
<title>Praktik 2 - Absolute</title>
<style>

.container {
  position: relative;
  width: 300px;
  height: 300px;
  background-color: lightgray;
}

.box1 {
  position: absolute;
  bottom: 0;
  right: 0;
  background-color: coral;
  width: 100px;
  height: 100px;
}

.box2 {
  position: absolute;
  top: 0;
  left: 0;
  background-color: lightblue;
  width: 100px;
  height: 100px;
}

.box3 {
  position: absolute;
  top: 100px;
  left: 100px;
  background-color: lightgreen;
  width: 100px;
  height: 100px;
}

.sudut1 {
  position: absolute;
  top: 0;
  left: 0;
  background-color: rgb(251, 206, 206);
  width: 80px;
  height: 80px;
}

.sudut2 {
  position: absolute;
  top: 0;
  right: 0;
  background-color: rgb(170, 170, 205);
  width: 80px;
  height: 80px;
}

.sudut3 {
  position: absolute;
  bottom: 0;
  left: 0;
  background-color: rgb(152, 186, 152);
  width: 80px;
  height: 80px;
}

.sudut4 {
  position: absolute;
  bottom: 0;
  right: 0;
  background-color: rgb(209, 183, 135);
  width: 80px;
  height: 80px;
}

</style>
</head>
<body>

<h2>Praktik 2 Position Absolute</h2>

<p>Tugas 1:</p>
<div class="container">
  <div class="box1"></div>
</div>

<p>Tugas 2:</p>
<div class="container">
  <div class="box2"></div>
  <div class="box3"></div>
</div>

<p>Tugas 3 (4 sudut):</p>
<div class="container">
  <div class="sudut1"></div>
  <div class="sudut2"></div>
  <div class="sudut3"></div>
  <div class="sudut4"></div>
</div>

</body>
</html>
